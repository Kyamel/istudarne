<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz IHC - Início</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">

    <section id="screen-start" class="screen">
      <h1 id="start-title">Carregando…</h1>
      <p id="start-description" class="muted"></p>
      <p id="start-resume" class="resume-note hidden">
        Encontramos um progresso salvo. Você pode continuar de onde parou.
      </p>

      <div class="actions actions-center">
        <button id="btn-start" class="btn btn-primary btn-lg">Começar quiz</button>
        <button id="btn-open-list" class="btn btn-lg">Ver todas em lista</button>
        <button id="btn-resume" class="btn btn-lg hidden">Continuar</button>
      </div>

      <div class="actions actions-center">
        <button id="btn-clear" class="btn btn-ghost hidden">🗑️ Limpar progresso salvo</button>
      </div>

      <!-- Upload de um questions.json -->
      <div class="upload-box">
        <p class="muted upload-label">Carregar outro banco de questões (.json):</p>
        <input type="file" id="file-json" accept="application/json,.json" />
        <p class="muted upload-hint" id="file-status"></p>
      </div>
    </section>

  </div>

  <script src="./common.js"></script>
  <script src="./index.js"></script>
</body>
</html>
