<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz IHC - Quiz</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">

    <!-- Barra superior: troca de modo -->
    <div class="topbar">
      <div class="tabs">
        <a class="tab is-active" href="quiz.html">Quiz</a>
        <a class="tab" href="list.html">Lista</a>
      </div>
      <a class="btn btn-ghost btn-sm" href="index.html">Início</a>
    </div>

    <!-- ===== Tela do Quiz ===== -->
    <section id="screen-quiz" class="screen">
      <header class="quiz-header">
        <div class="progress-row">
          <span id="progress-label" class="muted">Questão 1 de 100</span>
          <label class="checkbox-inline hidden" id="only-wrong-wrap">
            <input type="checkbox" id="chk-only-wrong" />
            Mostrar apenas erradas
          </label>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </header>

      <article class="card">
        <p id="q-topic" class="topic-tag"></p>
        <h2 id="q-statement" class="statement"></h2>
        <ul id="q-options" class="options"></ul>
        <p id="q-feedback" class="feedback hidden"></p>
      </article>

      <nav class="actions">
        <button id="btn-prev" class="btn">← Anterior</button>
        <button id="btn-next" class="btn">Próxima →</button>
        <button id="btn-correct" class="btn btn-primary">Corrigir</button>
        <button id="btn-restart" class="btn btn-ghost">Reiniciar</button>
      </nav>
    </section>

    <!-- ===== Tela de resultado ===== -->
    <section id="screen-result" class="screen hidden">
      <h1>Resultado</h1>

      <div class="score-grid">
        <div class="score-box"><span id="score-correct" class="score-num">0</span><span class="muted">Acertos</span></div>
        <div class="score-box"><span id="score-wrong" class="score-num">0</span><span class="muted">Erros</span></div>
        <div class="score-box"><span id="score-pct" class="score-num">0%</span><span class="muted">Aproveitamento</span></div>
      </div>

      <h2 class="wrong-title" id="wrong-title">Questões erradas</h2>
      <div id="wrong-list" class="wrong-list"></div>

      <nav class="actions actions-center">
        <button id="btn-review" class="btn btn-primary">Revisar questões</button>
        <button id="btn-redo-wrong" class="btn">Refazer apenas erradas</button>
        <button id="btn-restart-2" class="btn btn-ghost">Reiniciar tudo</button>
      </nav>
    </section>

  </div>

  <script src="./common.js"></script>
  <script src="./quiz.js"></script>
</body>
</html>
