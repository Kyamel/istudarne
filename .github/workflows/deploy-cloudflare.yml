name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "project.inlang/**"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Apply database migrations (Neon)
        run: pnpm run db:migrate

      - name: Deploy API Worker
        run: pnpm --filter @istudarne/api deploy

      - name: Deploy Web (React Router SSR Worker)
        # Bake the API origin into the client/SSR build via VITE_API_BASE.
        env:
          VITE_API_BASE: ${{ vars.API_BASE_URL }}
        run: pnpm --filter @istudarne/web deploy
