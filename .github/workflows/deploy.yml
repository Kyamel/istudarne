name: Deploy to GitHub Pages

# Publica o conteúdo da pasta ./src no GitHub Pages.
# Roda a cada push na branch main (e dá para rodar manualmente).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy do Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez (cancela execuções antigas em andamento).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar o site (pasta src)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
