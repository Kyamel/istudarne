<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz IHC - Lista</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">

    <!-- Barra superior: troca de modo -->
    <div class="topbar">
      <div class="tabs">
        <a id="tab-quiz" class="tab" href="quiz.html">Quiz</a>
        <a id="tab-list" class="tab is-active" href="list.html">Lista</a>
      </div>
      <a class="btn btn-ghost btn-sm" href="index.html">Início</a>
    </div>

    <div id="load-error" class="error-panel hidden" role="alert"></div>

    <section id="screen-list" class="screen">
      <div class="list-filters">
        <button class="chip is-active" data-filter="all" type="button">Todas <span id="cnt-all">0</span></button>
        <button class="chip" data-filter="answered" type="button">Respondidas <span id="cnt-answered">0</span></button>
        <button class="chip" data-filter="correct" type="button">Acertadas <span id="cnt-correct">0</span></button>
        <button class="chip" data-filter="wrong" type="button">Erradas <span id="cnt-wrong">0</span></button>
        <button class="chip" data-filter="unanswered" type="button">Não respondidas <span id="cnt-unanswered">0</span></button>
      </div>

      <p id="list-empty" class="muted list-empty hidden">Nenhuma questão neste filtro.</p>
      <div id="list-container" class="list-container"></div>

      <!-- Rodapé: resumo e ações -->
      <footer class="list-footer">
        <p id="list-summary" class="muted"></p>
        <div class="actions">
          <button id="btn-list-result" class="btn btn-primary" type="button">Ver resultado</button>
          <button id="btn-list-redo" class="btn" type="button">Refazer apenas erradas</button>
          <button id="btn-list-restart" class="btn btn-ghost" type="button">Reiniciar tudo</button>
        </div>
      </footer>
    </section>

  </div>

  <script src="./common.js"></script>
  <script src="./list.js"></script>
</body>
</html>
