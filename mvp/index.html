<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz IHC - Início</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">

    <section id="screen-start" class="screen">
      <div class="page-heading">
        <div>
          <h1>Quiz IHC</h1>
          <p class="muted">Escolha um banco salvo neste navegador ou carregue um novo arquivo JSON.</p>
        </div>
        <button id="btn-delete-all" class="btn btn-ghost btn-sm hidden" type="button">Excluir salvos</button>
      </div>

      <div id="load-error" class="error-panel hidden" role="alert"></div>

      <div class="library-section">
        <h2>Biblioteca local</h2>
        <div id="quiz-library" class="library-grid"></div>
      </div>

      <div class="upload-box">
        <div class="upload-header">
          <div>
            <h2>Adicionar quiz por JSON</h2>
            <p class="muted upload-label">Selecione um arquivo no mesmo formato do <code>questions.json</code>.</p>
          </div>
          <input type="file" id="file-json" accept="application/json,.json" />
        </div>
        <div id="file-status" class="upload-status muted"></div>
        <div id="file-errors" class="error-panel hidden" role="alert"></div>
      </div>
    </section>

  </div>

  <script src="./common.js"></script>
  <script src="./index.js"></script>
</body>
</html>
